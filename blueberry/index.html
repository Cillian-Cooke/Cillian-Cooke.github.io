<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blueberry</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: #ede3d5;
      background-image:
        radial-gradient(ellipse at 25% 35%, rgba(170,140,110,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 65%, rgba(150,120,90,0.07) 0%, transparent 50%);
    }

    /* Board is designed at 1400×900 and scaled to fit any viewport via JS */
    .board {
      position: absolute;
      width: 1400px;
      height: 900px;
      transform-origin: top left;
    }

    .frame {
      position: absolute;
      background: #fffdf9;
      box-shadow: 3px 5px 20px rgba(0,0,0,0.24), 0 1px 5px rgba(0,0,0,0.1);
      padding: 10px 10px 44px;
    }

    .photo-wrap {
      position: relative;
      overflow: hidden;
    }

    .photo-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-wrap canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Frame layout ────────────────────────────────────────────────────────
       All frames are 1.5× the previous photo-wrap sizes.
       Positions are chosen so rotated corners stay clear of neighbours.
       Horizontal and vertical gaps are ≥50px before rotation, which
       comfortably absorbs the ≤30px corner-shift from ±4.3° rotations.
    ── */

    /* f1 — portrait 3:4 — picture1 */
    .f1 {
      width: 410px;          /* photo-wrap 390 + 20px padding */
      top:  70px;
      left: 30px;
      transform: rotate(-3.1deg);
      z-index: 3;
    }
    .f1 .photo-wrap { width: 390px; height: 520px; }

    /* f2 — landscape 16:9 — picture2 (upper centre) */
    .f2 {
      width: 392px;          /* photo-wrap 372 + 20 */
      top:  30px;
      left: 500px;           /* gap from f1 right(440): 60px */
      transform: rotate(2.4deg);
      z-index: 2;
    }
    .f2 .photo-wrap { width: 372px; height: 209px; }

    /* f3 — landscape 4:3 — picture3 (upper right) */
    .f3 {
      width: 368px;          /* photo-wrap 348 + 20 */
      top:  25px;
      left: 960px;           /* gap from f2 right(892): 68px */
      transform: rotate(-4.3deg);
      z-index: 1;
    }
    .f3 .photo-wrap { width: 348px; height: 261px; }

    /* f4 — portrait 3:4 — picture4 (lower centre) */
    .f4 {
      width: 362px;          /* photo-wrap 342 + 20 */
      top:  340px;           /* gap from f2 bottom(293): 47px */
      left: 500px;           /* same column as f2, gap from f1: 60px */
      transform: rotate(1.9deg);
      z-index: 2;
    }
    .f4 .photo-wrap { width: 342px; height: 456px; }

    /* f5 — landscape 16:9 — picture5 (lower right) */
    .f5 {
      width: 392px;          /* photo-wrap 372 + 20, same as f2 */
      top:  420px;           /* gap from f3 bottom(340): 80px */
      left: 955px;           /* gap from f4 right(862): 93px */
      transform: rotate(-2.2deg);
      z-index: 4;
    }
    .f5 .photo-wrap { width: 372px; height: 209px; }
  </style>
</head>
<body>
<div class="board">

  <!-- Frame 1: picture1 (portrait) + Animation1 -->
  <div class="frame f1">
    <div class="photo-wrap" id="pw1">
      <img src="images/p1.jpg" alt="">
      <canvas id="canvas1"></canvas>
    </div>
  </div>

  <!-- Frame 2: picture2 (landscape 16:9) + Animation2 -->
  <div class="frame f2">
    <div class="photo-wrap" id="pw2">
      <img src="images/p2.jpg" alt="">
      <canvas id="canvas2"></canvas>
    </div>
  </div>

  <!-- Frame 3: picture3 (landscape 4:3) + Animation3 -->
  <div class="frame f3">
    <div class="photo-wrap" id="pw3">
      <img src="images/p3.jpg" alt="">
      <canvas id="canvas3"></canvas>
    </div>
  </div>

  <!-- Frame 4: picture4 (portrait) + Animation4 -->
  <div class="frame f4">
    <div class="photo-wrap" id="pw4">
      <img src="images/p4.jpg" alt="">
      <canvas id="canvas4"></canvas>
    </div>
  </div>

  <!-- Frame 5: picture5 (landscape) + Animation5 -->
  <div class="frame f5">
    <div class="photo-wrap" id="pw5">
      <img src="images/p5.jpg" alt="">
      <canvas id="canvas5"></canvas>
    </div>
  </div>

</div>

<script>
  // Scale the board to fill the viewport without scrollbars
  const BOARD_W = 1400, BOARD_H = 900;
  const board = document.querySelector('.board');
  function rescale() {
    const s  = Math.min(innerWidth / BOARD_W, innerHeight / BOARD_H);
    board.style.transform = `scale(${s})`;
    board.style.left = (innerWidth  - BOARD_W * s) / 2 + 'px';
    board.style.top  = (innerHeight - BOARD_H * s) / 2 + 'px';
  }
  rescale();
  addEventListener('resize', rescale);
</script>

<script type="module">
  // Animations play in sequence: 1 → 2 → 3 → 4 → 5, then stop
  const slots = [
    { wrap: 'pw1', canvas: 'canvas1', src: '../Animation1.riv', speed: 1.5 },
    { wrap: 'pw2', canvas: 'canvas2', src: '../Animation2.riv', speed: 1.2 },
    { wrap: 'pw3', canvas: 'canvas3', src: '../Animation3.riv', speed: 1.2 },
    { wrap: 'pw4', canvas: 'canvas4', src: '../Animation4.riv', speed: 1.2 },
    { wrap: 'pw5', canvas: 'canvas5', src: '../Animation5.riv', speed: 1.2 },
  ];

  // Size each canvas to its photo-wrap (CSS layout pixels, unaffected by transform)
  for (const s of slots) {
    const pw = document.getElementById(s.wrap);
    const c  = document.getElementById(s.canvas);
    c.width  = pw.offsetWidth;
    c.height = pw.offsetHeight;
  }

  // Boot Rive
  const mod  = await import('./rive/canvas_advanced.mjs');
  const rive = await mod.default({
    locateFile: f => new URL(
      f.endsWith('.wasm') ? 'rive/rive.wasm' : 'rive/' + f,
      location.href
    ).href,
  });

  async function loadAnim(src) {
    const bytes    = new Uint8Array(await (await fetch(src)).arrayBuffer());
    const file     = await rive.load(bytes);
    const artboard = file.defaultArtboard();
    const la       = artboard.animationByIndex(0);
    const inst     = new rive.LinearAnimationInstance(la, artboard);
    const durSec   = la.duration / la.fps;
    return { artboard, inst, durSec };
  }

  const anims     = await Promise.all(slots.map(s => loadAnim(s.src)));
  const canvases  = slots.map(s => document.getElementById(s.canvas));
  const renderers = canvases.map(c => rive.makeRenderer(c));

  function flush(r) { const H = r.H; for (const fn of H) fn(); H.length = 0; }

  function draw(artboard, inst, renderer, canvas, t) {
    inst.time = t;
    inst.apply(1.0);
    artboard.advance(0);
    renderer.clear();
    renderer.save();
    renderer.align(
      rive.Fit.fill,
      rive.Alignment.center,
      { minX: 0, minY: 0, maxX: canvas.width, maxY: canvas.height },
      artboard.bounds
    );
    artboard.draw(renderer);
    renderer.restore();
    flush(renderer);
  }

  let phase = 0, elapsed = 0, lastTime = null;

  function loop(time) {
    const dt = lastTime === null ? 0 : Math.min((time - lastTime) / 1000, 0.1);
    lastTime  = time;

    const { artboard, inst, durSec } = anims[phase];
    elapsed += dt * slots[phase].speed;

    if (elapsed >= durSec) {
      draw(artboard, inst, renderers[phase], canvases[phase], durSec - 0.001);
      if (++phase >= slots.length) return; // all done — holds final frames
      elapsed = 0;
    } else {
      draw(artboard, inst, renderers[phase], canvases[phase], elapsed);
    }

    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);
</script>
</body>
</html>
