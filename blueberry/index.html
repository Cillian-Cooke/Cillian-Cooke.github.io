<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blueberry</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: #ede3d5;
      background-image:
        radial-gradient(ellipse at 25% 35%, rgba(170,140,110,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 65%, rgba(150,120,90,0.07) 0%, transparent 50%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .board {
      position: relative;
      width: 960px;
      height: 680px;
    }

    .frame {
      position: absolute;
      background: #fffdf9;
      box-shadow: 3px 5px 20px rgba(0,0,0,0.24), 0 1px 5px rgba(0,0,0,0.1);
      padding: 10px 10px 44px;
    }

    .photo-wrap {
      position: relative;
      overflow: hidden;
    }

    .photo-wrap img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-wrap canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Frame positions & rotations ── */

    /* Frame 1 — portrait 3:4, picture1 */
    .f1 {
      width: 240px;
      top: 120px;
      left: 165px;
      transform: rotate(-3.1deg);
      z-index: 3;
    }
    .f1 .photo-wrap { width: 220px; height: 293px; }

    /* Frame 2 — landscape 16:9, picture2 */
    .f2 {
      width: 228px;
      top: 50px;
      left: 388px;
      transform: rotate(2.4deg);
      z-index: 2;
    }
    .f2 .photo-wrap { width: 208px; height: 117px; }

    /* Frame 3 — landscape 4:3, picture3 */
    .f3 {
      width: 214px;
      top: 65px;
      left: 648px;
      transform: rotate(-4.3deg);
      z-index: 1;
    }
    .f3 .photo-wrap { width: 194px; height: 145px; }

    /* Frame 4 — portrait 3:4, picture4 */
    .f4 {
      width: 210px;
      top: 340px;
      left: 78px;
      transform: rotate(1.9deg);
      z-index: 2;
    }
    .f4 .photo-wrap { width: 190px; height: 253px; }

    /* Frame 5 — landscape 16:9, picture5 */
    .f5 {
      width: 236px;
      top: 380px;
      left: 548px;
      transform: rotate(-2.2deg);
      z-index: 4;
    }
    .f5 .photo-wrap { width: 216px; height: 121px; }
  </style>
</head>
<body>
<div class="board">

  <!-- Frame 1: picture1 (portrait 3:4) + Animation1 -->
  <div class="frame f1">
    <div class="photo-wrap" id="pw1">
      <img src="images/p1.jpg" alt="">
      <canvas id="canvas1"></canvas>
    </div>
  </div>

  <!-- Frame 2: picture2 (landscape 16:9) + Animation2 -->
  <div class="frame f2">
    <div class="photo-wrap" id="pw2">
      <img src="images/p2.jpg" alt="">
      <canvas id="canvas2"></canvas>
    </div>
  </div>

  <!-- Frame 3: picture3 (landscape 4:3) + Animation3 -->
  <div class="frame f3">
    <div class="photo-wrap" id="pw3">
      <img src="images/p3.jpg" alt="">
      <canvas id="canvas3"></canvas>
    </div>
  </div>

  <!-- Frame 4: picture4 (portrait 3:4) + Animation4 -->
  <div class="frame f4">
    <div class="photo-wrap" id="pw4">
      <img src="images/p4.jpg" alt="">
      <canvas id="canvas4"></canvas>
    </div>
  </div>

  <!-- Frame 5: picture5 (landscape 16:9) + Animation5 -->
  <div class="frame f5">
    <div class="photo-wrap" id="pw5">
      <img src="images/p5.jpg" alt="">
      <canvas id="canvas5"></canvas>
    </div>
  </div>

</div>

<script type="module">
  // Animations play in sequence: 1 → 2 → 3 → 4 → 5 → 1 → …
  // speed: multiplier on natural animation speed (1.0 = as designed)
  const slots = [
    { wrap: 'pw1', canvas: 'canvas1', src: '../Animation1.riv', speed: 1.0 },
    { wrap: 'pw2', canvas: 'canvas2', src: '../Animation2.riv', speed: 0.8 },
    { wrap: 'pw3', canvas: 'canvas3', src: '../Animation3.riv', speed: 0.8 },
    { wrap: 'pw4', canvas: 'canvas4', src: '../Animation4.riv', speed: 0.8 },
    { wrap: 'pw5', canvas: 'canvas5', src: '../Animation5.riv', speed: 0.8 },
  ];

  // Size each canvas to its photo-wrap
  for (const s of slots) {
    const pw = document.getElementById(s.wrap);
    const c  = document.getElementById(s.canvas);
    c.width  = pw.offsetWidth;
    c.height = pw.offsetHeight;
  }

  // Boot Rive
  const mod  = await import('./rive/canvas_advanced.mjs');
  const rive = await mod.default({
    locateFile: f => new URL(
      f.endsWith('.wasm') ? 'rive/rive.wasm' : 'rive/' + f,
      location.href
    ).href,
  });

  async function loadAnim(src) {
    const bytes    = new Uint8Array(await (await fetch(src)).arrayBuffer());
    const file     = await rive.load(bytes);
    const artboard = file.defaultArtboard();
    const la       = artboard.animationByIndex(0);
    const inst     = new rive.LinearAnimationInstance(la, artboard);
    const durSec   = la.duration / la.fps;
    return { artboard, inst, durSec };
  }

  const anims     = await Promise.all(slots.map(s => loadAnim(s.src)));
  const canvases  = slots.map(s => document.getElementById(s.canvas));
  const renderers = canvases.map(c => rive.makeRenderer(c));

  function flush(r) {
    const H = r.H;
    for (const fn of H) fn();
    H.length = 0;
  }

  // Sequential state machine: plays one animation at a time
  let phase    = 0;
  let elapsed  = 0;
  let lastTime = null;

  function loop(time) {
    const dt = lastTime === null ? 0 : Math.min((time - lastTime) / 1000, 0.1);
    lastTime  = time;

    const { artboard, inst, durSec } = anims[phase];
    const renderer = renderers[phase];
    const canvas   = canvases[phase];

    elapsed += dt * slots[phase].speed;

    if (elapsed >= durSec) {
      // Clear this canvas and move to the next animation
      renderer.clear();
      flush(renderer);
      phase   = (phase + 1) % slots.length;
      elapsed = 0;
    } else {
      inst.time = elapsed;
      inst.apply(1.0);
      artboard.advance(0);

      renderer.clear();
      renderer.save();
      renderer.align(
        rive.Fit.fill,
        rive.Alignment.center,
        { minX: 0, minY: 0, maxX: canvas.width, maxY: canvas.height },
        artboard.bounds
      );
      artboard.draw(renderer);
      renderer.restore();
      flush(renderer);
    }

    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);
</script>
</body>
</html>
