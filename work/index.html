<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utmost</title>

  <!-- Hidden tool: keep it out of search engines and unlinked from the main site -->
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer">

  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="state-empty">

  <!-- ===== Top bar ===== -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">U</span>
      <span class="brand-name">Utmost</span>
    </div>

    <div class="doc-meta" aria-live="polite">
      <span class="doc-number"></span>
      <h1 class="doc-title"></h1>
    </div>

    <div class="topbar-actions">
      <span class="progress" aria-live="polite"></span>
      <button type="button" class="btn btn-icon" id="qcToggle" title="Quick copy">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
      <button type="button" class="btn btn-ghost" id="saveJsonBtn" hidden>Save JSON</button>
      <button type="button" class="btn btn-ghost" id="reloadBtn" hidden>Load file</button>
    </div>
  </header>

  <!-- ===== Empty / load state ===== -->
  <div class="qc-backdrop" id="qcBackdrop"></div>
  <section class="loader-screen" id="loaderScreen">
    <div class="loader-card">
      <p class="loader-eyebrow">Workspace configuration</p>
      <h2>Load a configuration file</h2>
      <p class="loader-sub">Select or drop a <code>.json</code> file to build the workspace.</p>

      <label class="dropzone" id="dropzone">
        <input type="file" accept="application/json,.json" id="fileInput" hidden>
        <span class="dz-icon">{&nbsp;}</span>
        <span class="dz-text"><strong>Click to choose a file</strong>, or drop it here</span>
      </label>

      <p class="loader-error" id="loaderError" hidden></p>

      <div class="loader-foot">
        <button type="button" class="link-like" id="sampleBtn">Download a sample file</button>
      </div>
    </div>
  </section>

  <!-- ===== Quick-copy panel ===== -->
  <aside class="qc-panel" id="qcPanel" aria-label="Quick copy"></aside>

  <!-- ===== Workspace ===== -->
  <main class="workspace" id="workspace" hidden>
    <div class="track" id="track"></div>
    <nav class="rail" id="rail" aria-label="Section navigation"></nav>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
